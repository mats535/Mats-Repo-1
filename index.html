<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slumptalsgenerator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 60px 60px 60px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: center;
            position: relative;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 0 0 200px;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding-right: 40px;
        }

        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 0 0 200px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding-left: 40px;
        }

        .main-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        #result {
            font-size: 100px;
            font-weight: 800;
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(0, 114, 255, 0.4);
        }

        button.active {
            transform: translateY(2px) !important;
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.3) !important;
            background: linear-gradient(45deg, #005bb5, #0099cc) !important;
        }

        /* Animation class for the number */
        .pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .custom-interval {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }

        .inputs input {
            width: 80px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            text-align: center;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            outline: none;
            font-weight: 600;
        }

        .inputs input:focus {
            box-shadow: 0 0 10px rgba(0, 114, 255, 0.4);
        }

        #customGenerateBtn {
            width: 100%;
        }

        /* Global Counter Setup */
        .global-counter {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
            text-align: right;
        }

        .global-counter strong {
            color: rgba(255, 255, 255, 0.95);
            font-size: 18px;
            display: block;
            margin-top: 4px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Vänster kolumn (Lägen) -->
        <div class="sidebar">
            <button class="modeBtn active" data-mode="all">Alla tal</button>
            <button class="modeBtn" data-mode="even">Jämna tal</button>
            <button class="modeBtn" data-mode="odd">Udda tal</button>
        </div>

        <!-- Mitten kolumn (Resultat & Manuellt intervall) -->
        <div class="main-panel">
            <h1>Slumptalsgenerator</h1>
            <div id="result">-</div>

            <div class="custom-interval">
                <div class="inputs">
                    <input type="number" id="customMin" placeholder="Min">
                    <span>-</span>
                    <input type="number" id="customMax" placeholder="Max">
                </div>
                <button id="customGenerateBtn">Slumpa inom intervall</button>
            </div>
        </div>

        <!-- Höger kolumn (Snabbval) -->
        <div class="sidebar-right">
            <button class="presetBtn" data-min="1" data-max="10">1-10</button>
            <button class="presetBtn" data-min="1" data-max="100">1-100</button>
            <button class="presetBtn" data-min="1" data-max="1000">1-1000</button>
        </div>

        <!-- Räknare -->
        <div class="global-counter">
            ANTAL SLUMPADE TAL
            <strong id="counterVal">0</strong>
        </div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const modeBtns = document.querySelectorAll('.modeBtn');
        const presetBtns = document.querySelectorAll('.presetBtn');
        const customGenerateBtn = document.getElementById('customGenerateBtn');
        const customMinInput = document.getElementById('customMin');
        const customMaxInput = document.getElementById('customMax');
        const counterVal = document.getElementById('counterVal');

        let currentMode = 'all';

        // Låtsas-global räknare med LocalStorage för att spara värdet lokalt
        let globalCount = localStorage.getItem('globalRandomCount');
        if (!globalCount) {
            globalCount = 0; // Starta på noll
        } else {
            globalCount = parseInt(globalCount, 10);
        }

        function updateCounterUI() {
            // Formaterar med mellanslag e.g. 1 040 258
            counterVal.textContent = new Intl.NumberFormat('sv-SE').format(globalCount);
        }
        updateCounterUI();

        function generateAndShow(min, max) {
            let realMin = min;
            let realMax = max;

            if (currentMode === 'even') {
                if (realMin % 2 !== 0) realMin++;
                if (realMax % 2 !== 0) realMax--;
            } else if (currentMode === 'odd') {
                if (realMin % 2 === 0) realMin++;
                if (realMax % 2 === 0) realMax--;
            }

            if (realMin > realMax) {
                resultDiv.textContent = "-";
                return;
            }

            let randomNumber;
            if (currentMode === 'all') {
                randomNumber = Math.floor(Math.random() * (realMax - realMin + 1)) + realMin;
            } else {
                const steps = Math.floor((realMax - realMin) / 2);
                const randomStep = Math.floor(Math.random() * (steps + 1));
                randomNumber = realMin + (randomStep * 2);
            }

            resultDiv.classList.remove('pop');
            setTimeout(() => {
                resultDiv.textContent = randomNumber;
                resultDiv.classList.add('pop');

                // Öka "globala" räknaren
                globalCount++;
                localStorage.setItem('globalRandomCount', globalCount);
                updateCounterUI();
            }, 10);
        }

        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.getAttribute('data-mode');
                customGenerateBtn.click();
            });
        });

        presetBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                customMinInput.value = btn.getAttribute('data-min');
                customMaxInput.value = btn.getAttribute('data-max');
                
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 150);

                customGenerateBtn.click();
            });
        });

        customGenerateBtn.addEventListener('click', () => {
            const minVal = parseInt(customMinInput.value, 10);
            const maxVal = parseInt(customMaxInput.value, 10);
            
            const min = isNaN(minVal) ? 0 : minVal;
            const max = isNaN(maxVal) ? 100 : maxVal;

            const realMin = Math.min(min, max);
            const realMax = Math.max(min, max);

            generateAndShow(realMin, realMax);
        });
    </script>

</body>

</html>
