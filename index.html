<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slumptalsgenerator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        #result {
            font-size: 100px;
            font-weight: 800;
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(0, 114, 255, 0.4);
        }

        /* Animation class for the number */
        .pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .custom-interval {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 20px;
        }

        .inputs input {
            width: 80px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            text-align: center;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            outline: none;
            font-weight: 600;
        }

        .inputs input:focus {
            box-shadow: 0 0 10px rgba(0, 114, 255, 0.4);
        }

        #customGenerateBtn {
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Slumptalsgenerator</h1>
        <div id="result">-</div>
        <div class="buttons">
            <button class="generateBtn" data-min="1" data-max="10">1-10</button>
            <button class="generateBtn" data-min="1" data-max="100">1-100</button>
            <button class="generateBtn" data-min="1" data-max="1000">1-1000</button>
        </div>

        <div class="custom-interval">
            <div class="inputs">
                <input type="number" id="customMin" placeholder="Min" value="1">
                <span>-</span>
                <input type="number" id="customMax" placeholder="Max" value="100">
            </div>
            <button id="customGenerateBtn">Slumpa inom intervall</button>
        </div>
    </div>

    <script>
        const resultDiv = document.getElementById('result');
        const generateBtns = document.querySelectorAll('.generateBtn');

        function generateAndShow(min, max) {
            const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
            resultDiv.classList.remove('pop');
            setTimeout(() => {
                resultDiv.textContent = randomNumber;
                resultDiv.classList.add('pop');
            }, 10);
        }

        generateBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const min = parseInt(btn.getAttribute('data-min'), 10);
                const max = parseInt(btn.getAttribute('data-max'), 10);
                generateAndShow(min, max);
            });
        });

        const customGenerateBtn = document.getElementById('customGenerateBtn');
        const customMinInput = document.getElementById('customMin');
        const customMaxInput = document.getElementById('customMax');

        customGenerateBtn.addEventListener('click', () => {
            const minVal = parseInt(customMinInput.value, 10);
            const maxVal = parseInt(customMaxInput.value, 10);
            
            const min = isNaN(minVal) ? 0 : minVal;
            const max = isNaN(maxVal) ? 0 : maxVal;

            const realMin = Math.min(min, max);
            const realMax = Math.max(min, max);

            generateAndShow(realMin, realMax);
        });
    </script>

</body>

</html>
