<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slumptalsgenerator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        #result {
            font-size: 100px;
            font-weight: 800;
            margin: 30px 0;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        button {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(221, 36, 118, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(221, 36, 118, 0.6);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(221, 36, 118, 0.4);
        }

        /* Animation class for the number */
        .pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Slumptalsgenerator</h1>
    <div id="result">-</div>
    <button id="generateBtn">Slumpa fram ett nytt tal</button>
</div>

<script>
    const resultDiv = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');

    generateBtn.addEventListener('click', () => {
        // Genererar ett tal mellan 0 och 1000
        const min = 0;
        const max = 1000;
        const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;

        // Ta bort animationsklassen kort för att kunna trigga den igen
        resultDiv.classList.remove('pop');
        
        // Använd en liten timeout så att webbläsaren registrerar borttagandet innan den läggs till
        setTimeout(() => {
            resultDiv.textContent = randomNumber;
            resultDiv.classList.add('pop');
        }, 10);
    });
</script>

</body>
</html>
